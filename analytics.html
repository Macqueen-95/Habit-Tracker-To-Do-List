<!DOCTYPE html>
<html>
<head>
    <title>Analytics - Habit Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="analytics">
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">FlowTrack</div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link" data-nav="dashboard">Dashboard</a>
                <a href="tasks.html" class="nav-link" data-nav="tasks">Tasks</a>
                <a href="habits.html" class="nav-link" data-nav="habits">Habits</a>
                <a href="analytics.html" class="nav-link" data-nav="analytics">Analytics</a>
                <a href="settings.html" class="nav-link" data-nav="settings">Settings</a>
            </nav>
            <button class="btn ghost" onclick="logout()">Logout</button>
        </aside>

        <main class="content">
            <header class="page-header">
                <h1>Analytics</h1>
                <p class="muted">Visual overview of productivity and consistency.</p>
            </header>

            <section class="split-grid">
                <div class="panel ring-panel">
                    <h2>Task Completion</h2>
                    <div class="ring-wrap">
                        <div id="completionRing" class="progress-ring" style="--percent: 0;"></div>
                        <p id="completionRingText" class="ring-label">0%</p>
                    </div>
                </div>

                <div class="panel">
                    <h2>Current Streaks</h2>
                    <ul id="streakList" class="item-list"></ul>
                </div>
            </section>

            <section class="panel">
                <h2>Weekly Productivity</h2>
                <div id="weeklyBars" class="bars-wrap"></div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
