<!DOCTYPE html>
<html>
<head>
    <title>Calendar - Habit Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="calendar">
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">FlowTrack</div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link" data-nav="dashboard">Dashboard</a>
                <a href="tasks.html" class="nav-link" data-nav="tasks">Tasks</a>
                <a href="habits.html" class="nav-link" data-nav="habits">Habits</a>
                <a href="analytics.html" class="nav-link" data-nav="analytics">Analytics</a>
                <a href="calendar.html" class="nav-link" data-nav="calendar">Calendar</a>
                <a href="settings.html" class="nav-link" data-nav="settings">Settings</a>
            </nav>
            <button class="btn ghost" onclick="logout()">Logout</button>
        </aside>

        <main class="content">
            <header class="page-header">
                <h1>Calendar View</h1>
                <p class="muted">See tasks and habits month-wise like a planner.</p>
            </header>

            <section class="panel">
                <div class="row-between">
                    <h2>Monthly Planner</h2>
                    <select id="calendarMonthSelect" class="small-select"></select>
                </div>
                <div id="calendarMonthGrid" class="month-grid"></div>
            </section>

            <section class="panel">
                <h2>Day Details</h2>
                <div id="calendarDayDetails" class="calendar-day-details">Select a date to view tasks and habits.</div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
