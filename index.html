<!DOCTYPE html>
<html>
<head>
    <title>Login - Habit Tracker & To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-card">
            <h1>Welcome Back</h1>
            <p class="subtitle">Login to your habit tracker</p>
            
            <div id="message"></div>

            <div class="form-group">
                <label for="loginUsername">Username</label>
                <input type="text" id="loginUsername" placeholder="Enter your username" class="form-input">
            </div>

            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" class="form-input">
            </div>

            <button class="btn btn-primary" onclick="handleLogin()">Login</button>

            <p class="auth-link">Don't have an account? <a href="register.html">Register here</a></p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function handleLogin() {
            let username = document.getElementById("loginUsername").value.trim();
            let password = document.getElementById("loginPassword").value.trim();

            if (!username || !password) {
                showMessage("Please enter username and password.", "error");
                return;
            }

            let users = getUsers();

            let validUser = users.find(user => user.username === username && user.password === password);

            if (validUser) {
                localStorage.setItem("loggedInUser", username);
                showMessage("Login successful! Redirecting...", "success");
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1000);
            } else {
                showMessage("Invalid username or password.", "error");
            }
        }

        function showMessage(msg, type) {
            let messageDiv = document.getElementById("message");
            messageDiv.textContent = msg;
            messageDiv.className = "message " + type;
            
            if (type === "success") {
                setTimeout(() => {
                    messageDiv.style.display = "none";
                }, 1000);
            }
        }

        // Allow Enter key to submit
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("loginPassword").addEventListener("keypress", (e) => {
                if (e.key === "Enter") handleLogin();
            });
        });
    </script>
</body>
</html>
